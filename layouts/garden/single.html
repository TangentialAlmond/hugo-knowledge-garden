{{ define "main" }}

<section class="container mx-auto px-4 py-12">

  <header class="mb-12">
    <h1 class="text-5xl font-bold">
      {{ .Title }}
    </h1>

    {{ with .Description }}
      <p class="mt-4 text-lg opacity-80">
        {{ . }}
      </p>
    {{ end }}
  </header>

  {{ partial "garden.html" . }}

</section>

{{ end }}
